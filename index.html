<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>证书查询</title>
  <style>
    :root {
      --page: #f8f9fc;
      --surface: #ffffff;
      --text: #27030a;
      --muted: #888888;
      --line: #eeeeee;
      --primary: #3c9cff;
      --shadow: 0 0 20px rgba(0, 0, 0, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100dvh;
      overflow-x: hidden;
      background: var(--page);
    }

    .shell {
      width: min(100%, 720px);
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--page);
    }

    .header {
      background: var(--surface);
      padding: 18px 16px 0;
      border-bottom: 1px solid var(--line);
    }

    .platform {
      margin: 0 0 14px;
      font-size: 18px;
      font-weight: 650;
      line-height: 1.35;
      color: var(--text);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      height: 48px;
    }

    .tab {
      position: relative;
      min-height: 44px;
      border: 0;
      background: transparent;
      color: #303133;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      touch-action: manipulation;
    }

    .tab:focus-visible {
      outline: 3px solid rgba(60, 156, 255, .32);
      outline-offset: -3px;
    }

    .tab[aria-selected="true"] {
      color: var(--primary);
      font-weight: 650;
    }

    .tab[aria-selected="true"]::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 36px;
      height: 3px;
      border-radius: 999px;
      background: var(--primary);
      transform: translateX(-50%);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .basic-info {
      margin-top: 8px;
      background: var(--surface);
      padding-left: 16px;
    }

    .field {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      align-items: center;
      min-height: 54px;
      padding: 10px 16px 10px 0;
      border-bottom: 1px solid var(--line);
      gap: 14px;
    }

    .field:last-child {
      border-bottom: 0;
    }

    .label {
      color: var(--muted);
      font-size: 14px;
    }

    .value {
      min-width: 0;
      color: #333333;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .records {
      display: grid;
      gap: 16px;
      padding: 16px;
    }

    .record {
      width: 100%;
      background: var(--surface);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .record-body {
      padding: 18px 10px 16px;
    }

    .record-title {
      margin: 0;
      padding: 0 10px 2px;
      color: var(--text);
      font-size: 16px;
      font-weight: 550;
      overflow-wrap: anywhere;
    }

    .row {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr);
      align-items: start;
      gap: 12px;
      margin-top: 14px;
      padding: 0 10px;
      color: #999999;
      font-size: 15px;
    }

    .row-name {
      white-space: nowrap;
    }

    .row-value {
      min-width: 0;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .empty {
      margin: 16px;
      padding: 72px 20px;
      background: var(--surface);
      color: #999999;
      text-align: center;
      border-radius: 8px;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px;
      }

      .shell {
        min-height: calc(100dvh - 48px);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 14px 40px rgba(28, 43, 70, .08);
      }

      .header {
        padding-inline: 24px;
      }

      .basic-info {
        margin: 16px;
        padding-left: 18px;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .field {
        grid-template-columns: 150px minmax(0, 1fr);
      }

      .records {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 360px) {
      .field,
      .row {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .value,
      .row-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="header">
        <nav class="tabs" role="tablist" aria-label="证书核验内容">
          <button class="tab" id="tab-info" type="button" role="tab" aria-controls="panel-info" aria-selected="true" data-target="info">学员信息</button>
          <button class="tab" id="tab-records" type="button" role="tab" aria-controls="panel-records" aria-selected="false" data-target="records">学习记录</button>
        </nav>
      </header>

      <section class="section active" id="panel-info" role="tabpanel" aria-labelledby="tab-info" data-panel="info">
        <div class="basic-info" aria-label="学员信息">
          <div class="field">
            <div class="label">姓名</div>
            <div class="value">向**</div>
          </div>
          <div class="field">
            <div class="label">性别</div>
            <div class="value">女</div>
          </div>
          <div class="field">
            <div class="label">手机号码</div>
            <div class="value">187****0848</div>
          </div>
          <div class="field">
            <div class="label">工作单位全称</div>
            <div class="value">遵义*********</div>
          </div>
          <div class="field">
            <div class="label">公需课学时</div>
            <div class="value">30</div>
          </div>
        </div>
      </section>

      <section class="section" id="panel-records" role="tabpanel" aria-labelledby="tab-records" data-panel="records">
        <div class="records" aria-label="学习记录">
          <article class="record">
            <div class="record-body">
              <h2 class="record-title">2025年公需科目课件</h2>
              <div class="row">
                <div class="row-name">学习时间</div>
                <div class="row-value">2025-05-21</div>
              </div>
              <div class="row">
                <div class="row-name">学习平台</div>
                <div class="row-value">贵州省专业技术人员继续教育平台</div>
              </div>
              <div class="row">
                <div class="row-name">学习类型</div>
                <div class="row-value">在线学习</div>
              </div>
            </div>
          </article>
        </div>
      </section>
    </div>
  </main>

  <script>
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const panels = Array.from(document.querySelectorAll("[data-panel]"));

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.target;

        tabs.forEach((item) => {
          item.setAttribute("aria-selected", String(item === tab));
        });

        panels.forEach((panel) => {
          panel.classList.toggle("active", panel.dataset.panel === target);
        });
      });
    });
  </script>
</body>
</html>
